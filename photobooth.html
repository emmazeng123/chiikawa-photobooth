<!DOCTYPE html>
<html>
<head>
    <title>Photobooth</title>
    <link rel="icon" href="Assets/favicon.jpg">
    <link rel="stylesheet" href="StyleSheets/photobooth.css">
</head>
<body>
    <!-- locked aspect ratio container -->
    <div class="photobooth-container">
        <!-- polaroid frame background -->
        <img src="./Assets/sample.png" class="polaroid-frame">
        
        <!-- camera inside the frame -->
        <video id="camera" class="camera" autoplay playsinline muted></video>
        
        <!-- canvas for capturing -->
        <canvas id="finalCanvas"></canvas>
        
        <!-- countdown timer -->
        <div class="countdown" id="countdown"></div>

        <!-- upload zones (shown in upload mode) -->
        <div class="upload-zone" id="uploadZone1" style="display:none;">
            <span>+</span>
            <span>upload photo 1</span>
        </div>
        <div class="upload-zone" id="uploadZone2" style="display:none;">
            <span>+</span>
            <span>upload photo 2</span>
        </div>
        
        <!-- sticker canvas -->
        <canvas id="stickerCanvas"></canvas>
    </div>
    
    <!-- photo controls -->
    <div class="controls" id="photoControls">
        <button id="ready">Take Photo</button>
        <button id="next" style="display: none;">Next</button>
    </div>
    
    <!-- sticker controls (hidden until decoration mode) -->
    <div class="controls" id="stickerControls" style="display: none;">
        <button id="addSticker1">Crying Chikawa</button>
        <button id="addSticker2">Fish Chikawa</button>
        <button id="savePolaroid">Save Polaroid</button>
    </div>
    
    <script src="JavaScript/photobooth.js"></script>
</body>
</html>
