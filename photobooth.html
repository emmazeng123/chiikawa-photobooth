<!DOCTYPE html>
<html>
<head>
    <title>chiikawa photobooth</title>
    <link rel="icon" href="Assets/favicon.jpg">
    <link rel="stylesheet" href="StyleSheets/photobooth.css">
</head>
<body>
    <div class="page"></div>
    <img class="sample" src="Assets/sample.png">

    <div class="frame">
        <video id="camera" autoplay playsinline></video>
        <canvas id="snapshot" hidden></canvas>
    </div>

    <div class="photo-frame1">
        <img id="photo1">
    </div>

    <div class="photo-frame1">
        <img id="photo2">
    </div>

    <button id="ready">ready</button>
    <div id="countdown"></div>



    <script src="JavaScript/photobooth.js"></script>
</body>
</html>
